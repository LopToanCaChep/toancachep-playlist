<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngân Hàng Đề Thi — Toán Cá Chép</title>
<meta name="description" content="Tổng hợp đề thi Toán Cá Chép — Lớp 11, 12, THPTQG. Luyện tập trực tuyến ngay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & ROOT ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cc-blue:#0040BE;--cc-blue-deep:#003B99;--cc-blue-sky:#1E85EB;--cc-blue-ice:#3C9EEF;
  --cc-yellow:#F7C800;--cc-orange:#E24500;--cc-orange-mid:#FF7800;
  --cc-ink:#0A1B3D;--cc-ink-soft:#2A3A5E;--cc-line:#E6EAF2;
  --cc-paper:#FFFFFF;--cc-paper-warm:#FFFBF0;--cc-cream:#FFF4D6;
  --font-display:'Unbounded',system-ui,sans-serif;
  --font-body:'Manrope',-apple-system,sans-serif;
  --shadow-sm:0 1px 2px rgba(10,27,61,.08);
  --shadow-md:0 6px 16px rgba(10,27,61,.10);
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-pill:999px;
}

body{
  background:#FFFFFF;color:var(--cc-ink);
  font-family:var(--font-body);font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;min-height:100dvh;
}

/* ========== PLAYLIST HUB CONTAINER ========== */
.hub{max-width:720px;margin:0 auto;padding:16px 16px 100px}

/* ========== HEADER ========== */
.hub-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.hub-logo{height:72px;object-fit:contain}
.hub-logo-text{display:none}
.hub-mascot{width:88px;height:88px;object-fit:contain;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ========== HERO ========== */
.hub-hero{
  background:var(--cc-blue-deep);
  border:none;border-radius:var(--r-lg);
  padding:28px 24px;margin:12px 0 20px;position:relative;overflow:hidden;
}
.hub-hero h1{font-family:var(--font-display);font-weight:800;font-size:clamp(22px,5vw,32px);
  color:var(--cc-yellow);line-height:1.15;margin-bottom:6px}
.hub-hero p{font-size:14px;color:rgba(255,255,255,.7);font-weight:500}

/* (math-strip removed) */

/* ========== FILTER TABS ========== */
.hub-filters{display:flex;gap:6px;padding:0 0 16px;overflow-x:auto;scrollbar-width:none}
.hub-filters::-webkit-scrollbar{display:none}
.filter-tab{
  font-family:var(--font-body);font-weight:600;font-size:13px;
  padding:7px 16px;border-radius:var(--r-pill);border:1.5px solid var(--cc-line);
  background:var(--cc-paper);color:var(--cc-ink-soft);cursor:pointer;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
}
.filter-tab:hover{border-color:var(--cc-blue-sky);color:var(--cc-blue-deep)}
.filter-tab.active{
  background:var(--cc-yellow);color:var(--cc-blue-deep);
  border-color:var(--cc-yellow);box-shadow:0 2px 0 rgba(10,27,61,.15);
}

/* ========== EXAM LIST ========== */
.exam-list{display:flex;flex-direction:column;gap:8px}

.exam-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;background:var(--cc-paper);
  border:1.5px solid var(--cc-line);border-radius:var(--r-md);
  cursor:pointer;transition:all .2s ease;position:relative;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  text-decoration:none;color:inherit;
}
.exam-row:hover{
  border-color:var(--cc-blue-deep);background:var(--cc-blue-deep);
  transform:translateY(-2px);box-shadow:var(--shadow-md);
}
.exam-row:hover .exam-title{color:#fff}
.exam-row:hover .exam-meta{color:rgba(255,255,255,.7)}
.exam-row:hover .exam-tag{background:rgba(255,255,255,.2) !important;color:#fff !important}
.exam-row:active{transform:translateY(0);box-shadow:var(--shadow-sm)}

.exam-icon{
  width:42px;height:42px;border-radius:var(--r-sm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;
  background:var(--cc-cream);color:var(--cc-blue-deep);
}
.exam-icon.orange{background:#FFF0E6;color:var(--cc-orange)}
.exam-icon.blue{background:#E8F4FD;color:var(--cc-blue-sky)}

.exam-info{flex:1;min-width:0}
.exam-title{font-weight:700;font-size:15px;color:var(--cc-ink);line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exam-meta{font-size:12px;color:var(--cc-ink-soft);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px 10px}
.exam-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-block}
.exam-tag.t12{background:#E8F4FD;color:var(--cc-blue)}
.exam-tag.t11{background:#E6F9EE;color:#1B7A3D}
.exam-tag.tqg{background:#FFF0E6;color:var(--cc-orange)}

.exam-arrow{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--cc-yellow);color:var(--cc-blue-deep);
  font-size:16px;font-weight:700;
  transition:transform .18s ease;
}
.exam-row:hover .exam-arrow{transform:translateX(3px)}

/* ========== EXAM VIEWER REMOVED (NOW OPENS FULLSCREEN) ========== */

/* ========== LOADING OVERLAY ========== */
.loader-overlay{
  position:fixed;inset:0;z-index:1001;
  display:none;align-items:center;justify-content:center;
  background:rgba(255,251,240,.92);backdrop-filter:blur(8px);
}
.loader-overlay.show{display:flex}
.loader-content{text-align:center}
.loader-fish{font-size:48px;animation:bounce .6s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-12px) rotate(5deg)}}
.loader-text{font-family:var(--font-display);font-weight:600;font-size:14px;
  color:var(--cc-blue-deep);margin-top:12px}

/* ========== EMPTY STATE ========== */
.empty-state{text-align:center;padding:40px 20px;color:var(--cc-ink-soft)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ========== PASSWORD MODAL ========== */
.pwd-overlay{
  position:fixed;inset:0;z-index:1005;
  display:none;align-items:center;justify-content:center;
  background:rgba(10,27,61,.5);backdrop-filter:blur(4px);
}
.pwd-overlay.show{display:flex}
.pwd-modal{
  background:var(--cc-paper);border-radius:var(--r-lg);
  padding:24px;width:90%;max-width:360px;
  box-shadow:var(--shadow-md);text-align:center;
  border:2px solid var(--cc-line);
}
.pwd-title{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--cc-blue-deep);margin-bottom:8px}
.pwd-desc{font-size:14px;color:var(--cc-ink-soft);margin-bottom:20px}
.pwd-input{
  width:100%;padding:12px 16px;border:2px solid var(--cc-line);
  border-radius:var(--r-md);font-family:var(--font-body);font-size:16px;
  outline:none;transition:border-color .2s;text-align:center;
  margin-bottom:12px;
}
.pwd-input:focus{border-color:var(--cc-blue-sky)}
.pwd-error{color:var(--cc-orange);font-size:13px;font-weight:600;margin-bottom:16px;display:none;animation:shake .3s}
.pwd-submit{
  width:100%;padding:12px;background:var(--cc-yellow);
  color:var(--cc-blue-deep);border:none;border-radius:var(--r-md);
  font-family:var(--font-display);font-weight:700;font-size:14px;
  cursor:pointer;transition:transform .15s;
}
.pwd-submit:active{transform:scale(0.97)}
.pwd-close{
  background:none;border:none;color:var(--cc-ink-soft);
  font-size:13px;font-weight:600;margin-top:16px;cursor:pointer;text-decoration:underline;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ========== FOOTER ========== */
.hub-footer{text-align:center;padding:24px 0 8px;font-size:12px;color:var(--cc-ink-soft);opacity:.6}

/* ========== RESPONSIVE ========== */
@media(min-width:640px){
  .hub{padding:24px 32px 80px}
  .exam-list{gap:10px}
  .exam-row{padding:16px 20px}
  .hub-hero{padding:36px 32px}
}
@media(min-width:900px){
  .hub{max-width:840px}
  .exam-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
}
</style>
</head>
<body>

<!-- ===== PASSWORD MODAL ===== -->
<div class="pwd-overlay" id="pwdOverlay">
  <div class="pwd-modal">
    <div class="pwd-title">Đề thi có mật khẩu</div>
    <div class="pwd-desc">Vui lòng nhập mật khẩu để tiếp tục</div>
    <input type="password" class="pwd-input" id="pwdInput" placeholder="Nhập mật khẩu..." autocomplete="off">
    <div class="pwd-error" id="pwdError">Sai mật khẩu! Vui lòng thử lại.</div>
    <button class="pwd-submit" id="btnPwdSubmit">MỞ ĐỀ THI</button>
    <button class="pwd-close" onclick="closePwdModal()">Hủy bỏ</button>
  </div>
</div>

<!-- ===== LOADING OVERLAY ===== -->
<div class="loader-overlay" id="loader">
  <div class="loader-content">
    <div class="loader-fish">🐟</div>
    <div class="loader-text">Đang tải đề thi...</div>
  </div>
</div>

<!-- (Exam viewer has been moved to open in full tab) -->

<!-- ===== MAIN HUB ===== -->
<div class="hub">

  <!-- Header -->
  <header class="hub-header">
    <img class="hub-logo" src="Pic/logoleft.png" alt="Cá Chép">
    <img class="hub-mascot" src="Pic/logoright.png" alt="Cá Chép mascot">
  </header>

  <!-- Hero -->
  <section class="hub-hero">
    <h1 id="heroTitle">Ngân hàng đề thi</h1>
    <p>Toán Cá Chép · Năm học 2025–2026</p>
  </section>

  <!-- Filters -->
  <div class="hub-filters" id="filters">
    <button class="filter-tab active" data-filter="all">Tất cả</button>
    <button class="filter-tab" data-filter="11">Lớp 11</button>
    <button class="filter-tab" data-filter="12">Lớp 12</button>
    <button class="filter-tab" data-filter="thptqg">THPTQG</button>
  </div>

  <!-- Exam List -->
  <div class="exam-list" id="examList"></div>

  <!-- Footer -->
  <footer class="hub-footer">Cá Chép © 2026 · Toán vui, điểm thật</footer>
</div>

<script>
/* ========== EXAM CONFIG ========== */
const EXAMS = [
  {
    id: 'de_01',
    file: null,
    hasPassword: true,
    title: 'Đề 07 — Thi thử THPTQG',
    grade: '12',
    type: 'thptqg',
    questions: 22,
    duration: 90,
    icon: '∫',
    iconStyle: ''
  },
  {
    id: 'de_02',
    file: 'de/de_02.html',
    hasPassword: false,
    title: 'Đề 02 — Cuối kỳ II',
    grade: '12',
    type: 'hk',
    questions: 35,
    duration: 60,
    icon: 'Σ',
    iconStyle: 'orange'
  },
  {
    id: 'de_03',
    file: 'de/de_03.html',
    hasPassword: false,
    title: 'Đề 02 — Học kỳ II',
    grade: '11',
    type: 'hk',
    questions: 30,
    duration: 90,
    icon: 'π',
    iconStyle: 'blue'
  },
  {
    id: 'de_04',
    file: null,
    hasPassword: true,
    title: 'Đề 02 — Cuối kỳ II',
    grade: '12',
    type: 'hk',
    questions: 24,
    duration: 90,
    icon: 'Σ',
    iconStyle: 'orange'
  },
  {
    id: 'de_05',
    file: null,
    hasPassword: true,
    title: 'Đề 03 — Học kỳ II',
    grade: '11',
    type: 'hk',
    questions: 24,
    duration: 90,
    icon: 'π',
    iconStyle: 'blue'
  },
  {
    id: 'de_06',
    file: null,
    hasPassword: true,
    title: 'Đề 04 — Học kỳ II',
    grade: '11',
    type: 'hk',
    questions: 24,
    duration: 90,
    icon: 'π',
    iconStyle: 'blue'
  },
  {
    id: 'de_07',
    file: null,
    hasPassword: true,
    title: 'Đề 05 — Học kỳ II',
    grade: '11',
    type: 'hk',
    questions: 24,
    duration: 90,
    icon: 'π',
    iconStyle: 'blue'
  }
];

/* ========== RENDER LIST ========== */
const listEl = document.getElementById('examList');
const loaderEl = document.getElementById('loader');

function renderList(filter = 'all') {
  const filtered = filter === 'all'
    ? EXAMS
    : EXAMS.filter(e => e.grade === filter || e.type === filter);

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state"><div class="icon">🐟</div><p>Chưa có đề thi nào trong mục này</p></div>';
    return;
  }

  listEl.innerHTML = filtered.map(exam => {
    const gradeTag = exam.grade === '12'
      ? '<span class="exam-tag t12">Lớp 12</span>'
      : '<span class="exam-tag t11">Lớp 11</span>';
    const typeTag = exam.type === 'thptqg'
      ? '<span class="exam-tag tqg">THPTQG</span>'
      : '';

    // Đề không mật khẩu: dùng <a> tag thật → Safari KHÔNG BAO GIỜ chặn link thật
    // Đề có mật khẩu: dùng div, click sẽ mở modal
    const tag = (!exam.hasPassword && exam.file) ? 'a' : 'div';
    const hrefAttr = (!exam.hasPassword && exam.file)
      ? `href="${exam.file}" target="_blank" rel="noopener"`
      : '';

    return `
      <${tag} class="exam-row" data-exam-id="${exam.id}" ${hrefAttr}
           role="button" tabindex="0"
           data-grade="${exam.grade}" data-type="${exam.type}">
        <div class="exam-icon ${exam.iconStyle}">${exam.icon}</div>
        <div class="exam-info">
          <div class="exam-title">${exam.title}</div>
          <div class="exam-meta">
            <span>${exam.questions} câu · ${exam.duration} phút</span>
            ${gradeTag}${typeTag}
          </div>
        </div>
        <div class="exam-arrow">→</div>
      </${tag}>`;
  }).join('');
}

/* ========== FILTER ========== */
document.getElementById('filters').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderList(tab.dataset.filter);
});

/* ========== LAZY-LOAD EXAM & PASSWORD ========== */
let currentExamId = null;
let _examBusy = false; // chống double-tap trên mobile
const pwdOverlay = document.getElementById('pwdOverlay');
const pwdInput = document.getElementById('pwdInput');
const pwdError = document.getElementById('pwdError');

// Hàm mã hóa SHA-256 giống trong PowerShell
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Event delegation – chỉ xử lý click cho đề CÓ MẬT KHẨU
// Đề không mật khẩu đã dùng <a> tag thật, trình duyệt tự xử lý
listEl.addEventListener('click', e => {
  // Nếu là <a> tag (đề không mật khẩu) → để trình duyệt xử lý, không can thiệp
  const row = e.target.closest('.exam-row');
  if (!row) return;
  if (row.tagName === 'A') return; // <a> tag tự mở link

  e.preventDefault();
  e.stopPropagation();

  if (_examBusy) return;
  _examBusy = true;
  setTimeout(() => { _examBusy = false; }, 800);

  const id = row.dataset.examId;
  const exam = EXAMS.find(ex => ex.id === id);
  if (!exam || !exam.hasPassword) return;

  currentExamId = id;
  pwdInput.value = '';
  pwdError.style.display = 'none';
  pwdOverlay.classList.add('show');
  setTimeout(() => pwdInput.focus(), 100);
});

function closePwdModal() {
  pwdOverlay.classList.remove('show');
  currentExamId = null;
}

// Chặn click overlay ngoài modal để đóng
pwdOverlay.addEventListener('click', e => {
  if (e.target === pwdOverlay) closePwdModal();
});

document.getElementById('btnPwdSubmit').addEventListener('click', async () => {
  const exam = EXAMS.find(e => e.id === currentExamId);
  const pwd = pwdInput.value.trim();
  if (!pwd || !exam) return;

  // === SAFARI FIX: Mở tab mới NGAY LẬP TỨC (synchronous, trong user gesture) ===
  // Sau đó mới tính hash (async). Safari chỉ cho mở tab trong sync context.
  const newTab = window.open('about:blank', '_blank');

  // Tính hash mật khẩu (async)
  const hash = await sha256(pwd);
  const guessedFile = `de/de_${hash}.html`;
  const fullUrl = new URL(guessedFile, window.location.href).href;

  // Kiểm tra file có tồn tại không bằng fetch HEAD
  try {
    const response = await fetch(guessedFile, { method: 'HEAD' });
    if (response.ok) {
      closePwdModal();
      if (newTab && !newTab.closed) newTab.location.href = fullUrl;
    } else {
      if (newTab && !newTab.closed) newTab.close();
      showPwdError();
    }
  } catch (err) {
    // Chạy trên máy tính (file://) — bypass
    console.warn("Chạy local: Bypass...");
    closePwdModal();
    if (newTab && !newTab.closed) newTab.location.href = fullUrl;
  }
});

function showPwdError() {
  pwdError.style.display = 'block';
  pwdInput.value = '';
  pwdInput.focus();
}

pwdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnPwdSubmit').click();
  if (e.key === 'Escape') closePwdModal();
});

// navigateToExam đã bỏ — đề thường dùng <a>, đề mật khẩu dùng pre-open tab


// Keyboard support on rows
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('exam-row')) e.target.click();
});

/* ========== URL PARAMETER & INIT ========== */
const urlParams = new URLSearchParams(window.location.search);
const gradeParam = urlParams.get('grade');

const heroTitleEl = document.getElementById('heroTitle');
const filtersEl = document.getElementById('filters');

if (gradeParam) {
  // Ẩn thanh filter nếu có parameter
  filtersEl.style.display = 'none';

  // Đổi tên tiêu đề Hero theo filter
  if (gradeParam === '10') heroTitleEl.textContent = 'Đề thi Lớp 10';
  else if (gradeParam === '11') heroTitleEl.textContent = 'Đề thi Lớp 11';
  else if (gradeParam === '12') heroTitleEl.textContent = 'Đề thi Lớp 12';
  else if (gradeParam === 'thptqg') heroTitleEl.textContent = 'Đề thi THPTQG';
  
  document.title = heroTitleEl.textContent + ' — Toán Cá Chép';
  
  // Render list theo parameter
  renderList(gradeParam);
} else {
  // Render tất cả như bình thường
  renderList();
}
</script>
</body>
</html>
